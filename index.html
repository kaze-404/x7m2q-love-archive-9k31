<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Secret Entry</title>

  <style>
    :root {
      --accent-strong: #ff0f8a;
      --accent-dark: #960034;
      --text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 32px 20px 88px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background-image:
        linear-gradient(rgba(15, 0, 8, 0.28), rgba(15, 0, 8, 0.4)),
        url('images/yourimage.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: Arial, sans-serif;
      color: var(--text);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .container {
      margin-top: 72px;
      width: min(94vw, 760px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(15, 0, 8, 0.24);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 50px var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.12;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      max-width: 100%;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .container.event-mode h1 {
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.18;
    }

    .occasion-label {
      margin-top: 12px;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ffd1e7;
      opacity: 0;
      min-height: 18px;
      transition: opacity 0.4s ease;
    }

    .occasion-label.show {
      opacity: 1;
    }

    button {
      padding: 18px 44px;
      font-size: 23px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-strong));
      color: var(--text);
      border: none;
      cursor: pointer;
      margin-top: 24px;
      box-shadow: 0 12px 28px rgba(150, 0, 52, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.01);
      background: linear-gradient(135deg, #ff2b98, #ff74bf);
      box-shadow: 0 16px 34px rgba(255, 15, 138, 0.32);
    }

    button:active {
      transform: scale(0.98);
    }

    .signature {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: 0.14em;
      color: #ff69c7;
      text-shadow:
        0 0 6px #ff69c7,
        0 0 12px #ff49b7,
        0 0 24px #ff1d9d,
        0 0 44px rgba(255, 29, 157, 0.9);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .signature.show {
      opacity: 1;
    }

    .date-debug {
      margin-top: 10px;
      font-size: 12px;
      color: #ffd1e7;
      opacity: 0.8;
      display: none;
    }

    .date-debug.show {
      display: block;
    }

    @media (max-width: 480px) {
      body {
        padding-top: 24px;
      }

      .container {
        margin-top: 40px;
        padding: 24px 18px;
      }

      button {
        width: 100%;
        font-size: 20px;
        padding: 16px 24px;
      }
    }
  </style>

  <script>
    const OCCASIONS = {
      '02-14': {
        title: "꧁𝙷𝚊𝚙𝚙𝚢 𝚅𝚊𝚕𝚎𝚗𝚝𝚒𝚗𝚎'𝚜 𝙳𝚊𝚢 𝙱𝚊𝚋𝚢꧂",
        label: 'February 14'
      },
      '06-01': {
        title: '꧁ ʜᴀᴘᴘʏ ᴀɴɴɪᴠᴇʀꜱᴀʀʏ ʙᴀʙʏ꧂',
        label: 'June 1'
      },
      '08-01': {
        title: "꧁𝕳𝖆𝖕𝖕𝖞 𝕲𝖎𝖗𝖑𝖋𝖗𝖎𝖊𝖓𝖉'𝖘 𝕯𝖆𝖞 𝕭𝖆𝖇𝖞꧂",
        label: 'August 1'
      },
      '11-11': {
        title: '꧁𝐇𝐚𝐩𝐩𝐲 𝐁𝐢𝐫𝐭𝐡𝐝𝐚𝐲 𝐁𝐚𝐛𝐲꧂',
        label: 'November 11'
      }
    };

    function getMonthDayKey() {
      const params = new URLSearchParams(window.location.search);
      const override = params.get('date');

      if (override && /^\d{2}-\d{2}$/.test(override)) {
        return override;
      }

      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${month}-${day}`;
    }

    function updateDebug(monthDayKey) {
      const params = new URLSearchParams(window.location.search);
      const debug = params.get('debug');
      const debugNode = document.getElementById('dateDebug');

      if (debug === '1') {
        debugNode.textContent = `Detected date: ${monthDayKey}`;
        debugNode.classList.add('show');
      } else {
        debugNode.classList.remove('show');
      }
    }

    function applyDateState() {
      const title = document.getElementById('heroTitle');
      const label = document.getElementById('occasionLabel');
      const signature = document.getElementById('signature');
      const container = document.getElementById('heroCard');
      const monthDayKey = getMonthDayKey();
      const occasion = OCCASIONS[monthDayKey] || null;

      if (occasion) {
        title.textContent = occasion.title;
        label.textContent = occasion.label;
        label.classList.add('show');
        signature.classList.remove('show');
        container.classList.add('event-mode');
      } else {
        title.textContent = 'Memories';
        label.textContent = '';
        label.classList.remove('show');
        signature.classList.add('show');
        container.classList.remove('event-mode');
      }

      updateDebug(monthDayKey);
      console.debug('Index date check:', monthDayKey, occasion ? occasion.label : 'non-event');
    }

    function initDateState() {
      applyDateState();
      window.addEventListener('pageshow', applyDateState);
      window.addEventListener('focus', applyDateState);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          applyDateState();
        }
      });
      window.setInterval(applyDateState, 60000);
    }

    function checkCode() {
      const code = prompt('Enter the secret code');

      if (code === '101251') {
        window.location.href = 'page2.html';
      } else if (code === '162025') {
        window.location.href = 'anniversary.html';
      } else {
        window.location.href = 'page_else.html';
      }
    }

    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', initDateState);
    } else {
      initDateState();
    }
  </script>
</head>
<body>
  <div class="container" id="heroCard">
    <h1 id="heroTitle">Memories</h1>
    <div class="occasion-label" id="occasionLabel"></div>
    <button onclick="checkCode()">ᴘʀᴇꜱꜱ ʜᴇʀᴇ</button>
    <div class="date-debug" id="dateDebug"></div>
  </div>

  <div class="signature" id="signature">Joel &amp; Jayanti</div>
</body>
</html>
